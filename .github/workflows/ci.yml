name: CI Pipeline

on:
  push:
    branches:
      - main
      - lesson-16.7_GitLabCiScript

jobs:

  build_jar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build JAR
        run: mvn clean install -Dgroups=integration

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar-file
          path: target/*.jar

  build_docker:
    needs: build_jar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: jar-file
          path: target

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t ${{ secrets.DOCKER_USER }}/iam-service-post-hub:latest .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USER }}/iam-service-post-hub:latest